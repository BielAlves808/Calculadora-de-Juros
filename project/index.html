<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Taxa de Juros</title>
    <link rel="icon" type="image/x-icon" href="Ico/favicon.ico">

    <script src="script.js"></script>

    <style>
        body{
            font-family: Arial;
            background-color:#f2f2f2;
            text-align:center;
            margin-top:50px;
        }

        .calculator{
            background:white;
            padding:20px;
            border-radius:10px;
            width:350px;
            margin:auto;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        input, select{
            margin:10px;
            padding:5px;
            width:80%;
        }

        button{
            padding:10px 20px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        #result{
            margin-top:20px;
            font-weight:bold;
        }
    </style>
</head>

<body>

<h1>Calculadora de Taxa de Juros</h1>

<div class="calculator">

    <label>Valor do investimento:</label><br>
    <input type="number" id="principal" placeholder="Ex: 1000"><br>

    <label>Taxa de juros (%):</label><br>
    <input type="number" id="rate" placeholder="Ex: 5"><br>

    <label>Anos:</label><br>
    <input type="number" id="years" placeholder="Ex: 5"><br>

    <button onclick="calculate()">Calcular</button>

    <p id="result"></p>

</div>

</body>
</html>
